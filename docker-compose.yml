version: "3.8"

services:
  cloudflare-speedtest:
    build: .
    image: cfst-web:latest
    container_name: cfst-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - PORT=8080
      - TZ=Asia/Shanghai
    # 飞牛NAS 需要 host 网络模式才能正确测速（避免 Docker NAT 影响延迟测试结果）
    # 如果你希望用端口映射方式，请注释掉下面这行，并取消上面的 ports 注释
    # network_mode: host
