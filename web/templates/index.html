<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudflareSpeedTest - Web UI</title>
<link rel="stylesheet" href="/static/css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
<div class="app">
  <!-- 顶部导航 -->
  <header class="header">
    <div class="header-left">
      <span class="logo">⚡</span>
      <h1>CloudflareSpeedTest</h1>
      <span class="badge" id="statusBadge">空闲</span>
    </div>
    <div class="header-right">
      <span class="version" id="healthStatus">检查中...</span>
    </div>
  </header>

  <!-- 标签页 -->
  <nav class="tabs">
    <button class="tab active" data-tab="control">🎛️ 测速控制</button>
    <button class="tab" data-tab="result">📊 测速结果</button>
    <button class="tab" data-tab="history">📁 历史记录</button>
    <button class="tab" data-tab="settings">⚙️ IP 配置</button>
  </nav>

  <!-- 测速控制 -->
  <section class="panel active" id="panel-control">
    <div class="card">
      <h2>基础参数</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>测速模式</label>
          <div class="toggle-group">
            <button class="toggle-btn active" data-mode="tcping">TCPing (默认)</button>
            <button class="toggle-btn" data-mode="httping">HTTPing</button>
          </div>
          <input type="hidden" id="httping" value="">
        </div>
        <div class="form-group">
          <label for="threads">延迟测速线程数</label>
          <input type="number" id="threads" value="200" min="1" max="1000" placeholder="默认 200">
        </div>
        <div class="form-group">
          <label for="ping_times">单 IP 测速次数</label>
          <input type="number" id="ping_times" value="4" min="1" placeholder="默认 4">
        </div>
        <div class="form-group">
          <label for="download_count">下载测速数量</label>
          <input type="number" id="download_count" value="10" min="0" placeholder="默认 10">
        </div>
        <div class="form-group">
          <label for="download_time">下载测速时间 (秒)</label>
          <input type="number" id="download_time" value="10" min="1" placeholder="默认 10">
        </div>
        <div class="form-group">
          <label for="port">测速端口</label>
          <input type="number" id="port" value="443" min="1" max="65535" placeholder="默认 443">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>过滤条件</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="max_delay">平均延迟上限 (ms)</label>
          <input type="number" id="max_delay" value="" placeholder="默认 9999">
        </div>
        <div class="form-group">
          <label for="min_delay">平均延迟下限 (ms)</label>
          <input type="number" id="min_delay" value="" placeholder="默认 0">
        </div>
        <div class="form-group">
          <label for="max_loss">丢包率上限 (0.00~1.00)</label>
          <input type="number" id="max_loss" value="" min="0" max="1" step="0.01" placeholder="默认 1.00">
        </div>
        <div class="form-group">
          <label for="min_speed">下载速度下限 (MB/s)</label>
          <input type="number" id="min_speed" value="" min="0" step="0.1" placeholder="默认 0">
        </div>
        <div class="form-group">
          <label for="cfcolo">指定地区码 (HTTPing)</label>
          <input type="text" id="cfcolo" value="" placeholder="如: HKG,NRT,LAX">
        </div>
        <div class="form-group">
          <label for="httping_code">HTTPing 状态码</label>
          <input type="number" id="httping_code" value="" placeholder="默认 200 301 302">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>高级选项</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="url">自定义测速地址</label>
          <input type="text" id="url" value="" placeholder="默认 https://cf.xiu2.xyz/url">
        </div>
        <div class="form-group">
          <label for="ip_text">指定 IP 段 (逗号分隔)</label>
          <input type="text" id="ip_text" value="" placeholder="如: 1.1.1.1,2.2.2.0/24">
        </div>
        <div class="form-group checkbox-group">
          <label><input type="checkbox" id="disable_download"> 禁用下载测速</label>
          <label><input type="checkbox" id="all_ip"> 测速全部 IP</label>
          <label><input type="checkbox" id="debug"> 调试模式</label>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary btn-lg" id="btnStart" onclick="startTest()">
        🚀 开始测速
      </button>
      <button class="btn btn-danger btn-lg" id="btnStop" onclick="stopTest()" style="display:none">
        ⏹ 停止测速
      </button>
    </div>

    <!-- 实时日志 -->
    <div class="card log-card" id="logCard" style="display:none">
      <div class="log-header">
        <h2>📋 实时日志</h2>
        <span class="log-count" id="logCount">0 行</span>
      </div>
      <div class="log-output" id="logOutput"></div>
    </div>
  </section>

  <!-- 测速结果 -->
  <section class="panel" id="panel-result">
    <div class="card">
      <div class="result-header">
        <h2>📊 最新测速结果</h2>
        <div class="result-actions">
          <button class="btn btn-sm" onclick="exportCSV()">📥 导出 CSV</button>
        </div>
      </div>
      <div class="table-wrap" id="resultTableWrap">
        <p class="empty-hint">暂无测速结果，请先运行一次测速 🚀</p>
      </div>
    </div>
  </section>

  <!-- 历史记录 -->
  <section class="panel" id="panel-history">
    <div class="card">
      <h2>📁 历史测速记录</h2>
      <div id="historyList">
        <p class="empty-hint">加载中...</p>
      </div>
    </div>
  </section>

  <!-- IP 配置 -->
  <section class="panel" id="panel-settings">
    <div class="card">
      <h2>⚙️ IP 段数据文件</h2>
      <p class="hint">编辑下方的 IP 段列表，每行一个 IP 或 CIDR 格式。修改后点击保存。</p>
      <textarea id="ipContent" rows="20" placeholder="加载中..."></textarea>
      <div class="action-bar">
        <button class="btn btn-primary" onclick="saveIPConfig()">💾 保存配置</button>
        <button class="btn" onclick="loadIPConfig()">🔄 重新加载</button>
      </div>
    </div>
  </section>
</div>

<!-- 历史详情弹窗 -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">详情</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
